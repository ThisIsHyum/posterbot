version: "3.9"

services:
  posterbot:
    image: posterbot:latest
    build: .
    container_name: posterbot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./bot.db:/app/data/bot.db
    environment:
      - BOT_ENV=production
    networks:
      - botnet

networks:
  botnet:
    driver: bridge
